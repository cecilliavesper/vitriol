name: Vitriol

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: true

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Setup
        run: mise run setup

      - name: Format Check
        run: mise run fmt -- --check

      - name: Clippy Lint
        run: mise run lint

      - name: Run Tests
        run: mise run test

  commit-lint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Cocogitto needs history to check commit messages

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Setup
        run: mise run setup

      - name: Check Conventional Commits
        run: mise exec -- cog check -i
